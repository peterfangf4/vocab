*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px}
.container{width:100%;max-width:420px}
.header{text-align:center;color:#fff;margin-bottom:20px}
.header h1{font-size:24px;margin-bottom:4px}

.card{background:#fff;border-radius:20px;padding:28px 24px;box-shadow:0 20px 60px rgba(0,0,0,0.2);min-height:340px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transition:transform 0.3s;cursor:pointer;user-select:none}
.card:active{transform:scale(0.97)}
.card .label{font-size:13px;color:#999;margin-bottom:8px;letter-spacing:2px}
.card .word{font-size:36px;font-weight:700;color:#333;margin:12px 0;word-break:break-all}
.card .meaning{font-size:20px;color:#666;margin:8px 0;transition:all 0.4s}
.card .hint{font-size:13px;color:#aaa;margin-top:16px}
.flipped .meaning{color:#764ba2;font-weight:600}
.score-bar{display:flex;justify-content:space-between;color:#fff;margin-bottom:12px;font-size:15px}
.score-bar span{background:rgba(255,255,255,0.2);padding:6px 14px;border-radius:20px}
.mode-tabs{display:flex;gap:8px;margin-bottom:16px}
.mode-tabs button{flex:1;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;background:rgba(255,255,255,0.25);color:#fff}
.mode-tabs button.active{background:#fff;color:#764ba2}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-top:16px}
.quiz-options button{padding:14px 10px;border:2px solid #e0e0e0;border-radius:14px;font-size:16px;font-weight:600;background:#fff;cursor:pointer;transition:all 0.2s;word-break:break-all}
.quiz-options button:active{transform:scale(0.95)}
.quiz-options button.correct{background:#4caf50;color:#fff;border-color:#4caf50}
.quiz-options button.wrong{background:#f44336;color:#fff;border-color:#f44336}
.quiz-options button:disabled{pointer-events:none}
.meaning-quiz{font-size:22px;font-weight:600;color:#333;margin:12px 0;text-align:center}
.btn-row{display:flex;gap:10px;margin-top:20px;width:100%}
.btn-row button{flex:1;padding:12px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer}
.btn-skip{background:#f0f0f0;color:#666}
.btn-next{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-row button:active{transform:scale(0.95)}
.feedback{font-size:16px;font-weight:600;margin-top:12px;min-height:24px;text-align:center}
.feedback.correct{color:#4caf50}
.feedback.wrong{color:#f44336}
.progress{height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:#fff;border-radius:2px;transition:width 0.3s}
</style>
